<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MERGE STORM</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0a0713; overflow: hidden; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #c { display: block; width: 100vw; height: 100vh; }
  #label {
    position: fixed; top: 3%; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,0.5); font-weight: 600; font-size: 4vw;
    letter-spacing: 0.3em; pointer-events: none; z-index: 10;
  }
  #maxval {
    position: fixed; top: 6.5%; left: 0; right: 0; text-align: center;
    color: #fff; font-weight: 800; font-size: 18vw; line-height: 1;
    text-shadow: 0 0 20px rgba(255,150,90,0.7), 0 0 40px rgba(255,150,90,0.35);
    pointer-events: none; z-index: 10; font-variant-numeric: tabular-nums;
  }
  #score {
    position: fixed; top: 17%; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,0.6); font-weight: 700; font-size: 4.2vw;
    pointer-events: none; z-index: 10; font-variant-numeric: tabular-nums;
  }
  #hint {
    position: fixed; bottom: 5%; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,0.5); font-size: 4.3vw; font-weight: 600;
    pointer-events: none; z-index: 10;
  }
  #gameover {
    position: fixed; top: 40%; left: 0; right: 0; text-align: center;
    color: #ff8f6b; font-weight: 800; font-size: 8vw; letter-spacing: 0.1em;
    pointer-events: none; z-index: 11; opacity: 0; text-shadow: 0 0 20px rgba(255,100,60,0.6);
  }
</style>
</head>
<body>
<div id="label">MERGE STORM</div>
<div id="maxval">0</div>
<div id="score">score 0</div>
<div id="gameover">GAME OVER</div>
<div id="hint">TAP TO START — LEFT / RIGHT TO STEER</div>
<canvas id="c"></canvas>
<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var maxvalEl = document.getElementById('maxval');
  var scoreEl = document.getElementById('score');
  var hintEl = document.getElementById('hint');
  var gameoverEl = document.getElementById('gameover');

  var COLS = 5;
  var cellSize = 0, boardLeft = 0, boardTop = 0, boardWidthPx = 0, boardHeightPx = 0, ROWS = 0;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function layout() {
    var w = window.innerWidth, h = window.innerHeight;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    boardTop = h * 0.24;
    var bottomMargin = h * 0.1;
    var availH = h - boardTop - bottomMargin;
    var availW = w * 0.92;
    boardWidthPx = Math.min(availW, availH * 0.62);
    cellSize = boardWidthPx / COLS;
    ROWS = Math.max(4, Math.floor(availH / cellSize));
    boardHeightPx = cellSize * ROWS;
    boardWidthPx = cellSize * COLS;
    boardLeft = (w - boardWidthPx) / 2;
  }

  var grid; // grid[col] = array of stacked values, index 0 = bottom
  var falling; // {col, y, value}
  var state = 'ready'; // ready | playing | gameover
  var score = 0;
  var maxValue = 0;
  var bestScore = 0;
  var gameoverAt = 0;

  try { bestScore = parseInt(localStorage.getItem('mergeStormBest') || '0', 10) || 0; } catch (e) {}

  // technique from sasha240100/between.js (mit) — minimal tween pump serviced by the game's own rAF loop
  var activeTweens = [];
  function easeLinear(t) { return t; }
  function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
  function easeOutBack(t) {
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }
  function killTweens(obj) {
    for (var i = activeTweens.length - 1; i >= 0; i--) {
      if (activeTweens[i].obj === obj) activeTweens.splice(i, 1);
    }
  }
  function tween(obj, target, duration, ease) {
    killTweens(obj);
    var start = {};
    for (var k in target) start[k] = obj[k];
    activeTweens.push({ obj: obj, start: start, target: target, duration: duration, ease: ease || easeLinear, elapsed: 0 });
  }
  function updateTweens(dtMs) {
    for (var i = activeTweens.length - 1; i >= 0; i--) {
      var t = activeTweens[i];
      t.elapsed += dtMs;
      var p = Math.min(t.elapsed / t.duration, 1);
      var e = t.ease(p);
      for (var k in t.target) t.obj[k] = t.start[k] + (t.target[k] - t.start[k]) * e;
      if (p >= 1) activeTweens.splice(i, 1);
    }
  }

  var shake = { mag: 0 };
  var maxvalScale = { v: 1 };

  var particles = [];
  function spawnBurst(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 60 + Math.random() * 140;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 60,
        life: 1, color: color, size: 2 + Math.random() * 3
      });
    }
  }
  function updateParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.vy += 280 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt / 0.55;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // technique from keithwhor/audiosynth (mit) — oscillator + ADSR gain envelope, no audio files
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  function playTone(freq, duration, type, peak) {
    if (!audioCtx) return;
    var t0 = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.012);
    gain.gain.linearRampToValueAtTime(peak * 0.55, t0 + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }
  function sfxMerge(level) {
    playTone(220 + Math.min(level, 10) * 55, 0.16, 'triangle', 0.22);
  }
  function sfxGameOver() {
    playTone(180, 0.45, 'sawtooth', 0.2);
    setTimeout(function () { playTone(120, 0.55, 'sawtooth', 0.18); }, 90);
  }

  function updateScoreDisplay() {
    scoreEl.textContent = 'score ' + score + '   best ' + bestScore;
  }

  function resetGame() {
    grid = [];
    for (var i = 0; i < COLS; i++) grid.push([]);
    score = 0;
    maxValue = 0;
    updateScoreDisplay();
    maxvalEl.textContent = '0';
    gameoverEl.style.opacity = '0';
    spawnFalling();
  }

  function spawnValue() {
    return Math.random() < 0.1 ? 4 : 2;
  }

  function spawnFalling() {
    falling = { col: Math.floor(COLS / 2), y: 0, value: spawnValue() };
  }

  function landBlock(col, value) {
    var v = value;
    var col_stack = grid[col];
    var mergeCount = 0;
    var burstX = boardLeft + col * cellSize + cellSize / 2;
    while (col_stack.length && col_stack[col_stack.length - 1] === v) {
      col_stack.pop();
      v *= 2;
      mergeCount++;
    }
    col_stack.push(v);
    score += v;
    if (score > bestScore) bestScore = score;
    updateScoreDisplay();
    if (mergeCount > 0) {
      var burstY = boardTop + boardHeightPx - col_stack.length * cellSize + cellSize / 2;
      spawnBurst(burstX, burstY, colorForValue(v), 8 + mergeCount * 6);
      shake.mag = Math.min(2 + mergeCount * 3, 18);
      tween(shake, { mag: 0 }, 220, easeOutQuad);
      sfxMerge(mergeCount + Math.log2(v));
    }
    if (v > maxValue) {
      maxValue = v;
      maxvalEl.textContent = String(maxValue);
      maxvalScale.v = 1.35;
      tween(maxvalScale, { v: 1 }, 260, easeOutBack);
    }
    if (col_stack.length > ROWS) {
      state = 'gameover';
      gameoverAt = performance.now();
      gameoverEl.style.opacity = '1';
      hintEl.textContent = 'TAP TO RESTART';
      hintEl.style.display = 'block';
      shake.mag = 22;
      tween(shake, { mag: 0 }, 400, easeOutQuad);
      sfxGameOver();
      try { localStorage.setItem('mergeStormBest', String(bestScore)); } catch (e) {}
    }
  }

  function colorForValue(v) {
    var levels = Math.log2(v);
    var hue = (205 + levels * 34) % 360;
    return 'hsl(' + hue + ', 68%, 56%)';
  }

  function drawBoard() {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    for (var c = 0; c <= COLS; c++) {
      var x = boardLeft + c * cellSize;
      ctx.beginPath();
      ctx.moveTo(x, boardTop);
      ctx.lineTo(x, boardTop + boardHeightPx);
      ctx.stroke();
    }
    ctx.strokeRect(boardLeft, boardTop, boardWidthPx, boardHeightPx);
  }

  function drawBlock(col, rowFromBottom, value, yPixelOverride) {
    var x = boardLeft + col * cellSize;
    var y = (yPixelOverride !== undefined)
      ? yPixelOverride
      : boardTop + boardHeightPx - (rowFromBottom + 1) * cellSize;
    var pad = cellSize * 0.06;
    ctx.fillStyle = colorForValue(value);
    var r = cellSize * 0.14;
    ctx.beginPath();
    ctx.moveTo(x + pad + r, y + pad);
    ctx.arcTo(x + cellSize - pad, y + pad, x + cellSize - pad, y + cellSize - pad, r);
    ctx.arcTo(x + cellSize - pad, y + cellSize - pad, x + pad, y + cellSize - pad, r);
    ctx.arcTo(x + pad, y + cellSize - pad, x + pad, y + pad, r);
    ctx.arcTo(x + pad, y + pad, x + cellSize - pad, y + pad, r);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = '700 ' + Math.round(cellSize * 0.34) + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(value), x + cellSize / 2, y + cellSize / 2 + cellSize * 0.02);
  }

  function render() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.save();
    if (shake.mag > 0.01) {
      ctx.translate((Math.random() * 2 - 1) * shake.mag, (Math.random() * 2 - 1) * shake.mag);
    }
    drawBoard();
    for (var c = 0; c < COLS; c++) {
      for (var r = 0; r < grid[c].length; r++) drawBlock(c, r, grid[c][r]);
    }
    if (state === 'playing' && falling) drawBlock(falling.col, 0, falling.value, boardTop + falling.y);
    drawParticles();
    ctx.restore();
  }

  var lastTime = null;
  function tick(now) {
    if (lastTime === null) lastTime = now;
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    if (state === 'playing' && falling) {
      var speed = cellSize * (0.55 + Math.min(score, 2000) / 2000 * 0.9);
      falling.y += speed * dt;
      var landingY = boardHeightPx - (grid[falling.col].length + 1) * cellSize;
      if (falling.y >= landingY) {
        landBlock(falling.col, falling.value);
        if (state === 'playing') spawnFalling();
      }
    }

    updateTweens(dt * 1000);
    updateParticles(dt);
    maxvalEl.style.transform = 'scale(' + maxvalScale.v.toFixed(3) + ')';

    render();
    window.__GAME = { score: score, state: state };
    requestAnimationFrame(tick);
  }

  function handleTap(clientX) {
    ensureAudio();
    if (state === 'ready') {
      hintEl.style.display = 'none';
      resetGame();
      state = 'playing';
      return;
    }
    if (state === 'gameover') {
      if (performance.now() - gameoverAt < 350) return; // grace period against accidental instant restart
      hintEl.style.display = 'none';
      resetGame();
      state = 'playing';
      return;
    }
    if (state === 'playing') {
      var w = window.innerWidth;
      if (clientX < w / 2) {
        falling.col = Math.max(0, falling.col - 1);
      } else {
        falling.col = Math.min(COLS - 1, falling.col + 1);
      }
    }
  }

  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    var t = e.changedTouches[0];
    handleTap(t.clientX);
  }, { passive: false });

  canvas.addEventListener('mousedown', function (e) {
    handleTap(e.clientX);
  });

  window.addEventListener('resize', layout);

  grid = [];
  for (var i0 = 0; i0 < COLS; i0++) grid.push([]);
  layout();
  window.__GAME = { score: 0, state: 'ready' };
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
